    <button onclick="document.getElementById('miModal').style.display='block'" 
            style="background-color: #888; color: black; padding: 10px 20px; border: none; cursor: pointer;">
        Secret
    </button>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <input type="text" id="usuario" placeholder="Usuario"><br>
            <input type="password" id="pass" placeholder="Contraseña"><br>
            <button onclick="validar()">Entrar</button>
            <button onclick="document.getElementById('miModal').style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
        function validar() {
            var userCorrecto = "QXJlbHk=";
            var passCorrecto = "me gustas";
            var user = document.getElementById("usuario").value;
            var pass = document.getElementById("pass").value;

            if (user === userCorrecto && pass === passCorrecto) {
                if (confirm("Datos correctos. ¿Puede mantener el secreto?")) {
                    window.location.href = "really.html";
                }
            } else if (user !== userCorrecto && pass !== passCorrecto) {
                alert("Error: Tanto el usuario como la contraseña son incorrectos.");
            } else if (user !== userCorrecto) {
                alert("Error: El usuario es incorrecto.");
            } else {
                alert("Error: La contraseña es incorrecta.");
            }
        }
    </script>
